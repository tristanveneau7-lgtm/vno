<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Maison Rose · Moncton</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, 'Times New Roman', serif; background: #F8F4EE; color: #2A2119; min-height: 100vh; }
  .header { padding: 20px 28px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  .brand { font-size: 17px; font-style: italic; }
  .menu { font-size: 11px; letter-spacing: 0.15em; }
  .hero { padding: 60px 28px 32px; text-align: center; }
  .eyebrow { font-family: -apple-system, sans-serif; font-size: 11px; letter-spacing: 0.25em; color: #9A7F6A; margin-bottom: 24px; }
  .hero h1 { font-size: 64px; line-height: 0.95; font-weight: 400; letter-spacing: -0.02em; }
  .hero h1 em { color: #9A7F6A; font-style: italic; }
  .lead { padding: 0 28px 28px; display: flex; gap: 20px; align-items: flex-end; }
  .lead p { font-family: -apple-system, sans-serif; font-size: 14px; line-height: 1.6; color: #5C4E42; flex: 1; }
  .portrait { width: 120px; height: 150px; background: linear-gradient(135deg, #D8C4B4, #B8967E); border-radius: 2px; flex-shrink: 0; }
  .actions { padding: 0 28px 40px; display: flex; gap: 10px; }
  .btn-primary { flex: 1; padding: 16px; background: #2A2119; color: #F8F4EE; font-family: -apple-system, sans-serif; font-size: 14px; text-align: center; letter-spacing: 0.04em; border: none; cursor: pointer; }
  .btn-secondary { padding: 16px 22px; background: transparent; color: #2A2119; border: 0.5px solid #2A2119; font-family: -apple-system, sans-serif; font-size: 14px; letter-spacing: 0.04em; cursor: pointer; }
  .sections { padding: 32px 28px; border-top: 0.5px solid rgba(0,0,0,0.08); display: flex; justify-content: space-between; font-family: -apple-system, sans-serif; }
  .section-item h2 { font-family: Georgia, serif; font-size: 28px; margin-bottom: 6px; color: #2A2119; }
  .section-item .label { font-size: 11px; letter-spacing: 0.1em; color: #5C4E42; }
  .footer { padding: 24px 28px; text-align: center; font-family: -apple-system, sans-serif; font-size: 11px; color: #9A7F6A; letter-spacing: 0.1em; border-top: 0.5px solid rgba(0,0,0,0.08); }
</style>
</head>
<body>
  <header class="header">
    <span class="brand">Maison Rose</span>
    <span class="menu">MENU</span>
  </header>
  <section class="hero">
    <p class="eyebrow">— MONCTON EST. 2019 —</p>
    <h1>A chair<br><em>you</em><br>return<br>to.</h1>
  </section>
  <section class="lead">
    <p>Color, cut, and a slow morning. Walk-ins welcome Wednesday through Saturday.</p>
    <div class="portrait"></div>
  </section>
  <section class="actions">
    <button class="btn-primary">Book a chair</button>
    <button class="btn-secondary">Call</button>
  </section>
  <section class="sections">
    <div class="section-item"><h2>I.</h2><div class="label">THE CRAFT</div></div>
    <div class="section-item"><h2>II.</h2><div class="label">THE PRICE</div></div>
    <div class="section-item"><h2>III.</h2><div class="label">THE CHAIR</div></div>
  </section>
  <footer class="footer">228 MAIN ST · (506) 555-0114 · WED–SAT 10–6</footer>
</body>
</html>
